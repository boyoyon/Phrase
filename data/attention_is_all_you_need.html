<h3><a href="https://ja.wikipedia.org/wiki/Attention_Is_All_You_Need">ウィキペディア：Attentin is All You Need</a></h3>
<p>
2017 年に Google の研究チーム（Ashish Vaswani氏ら）によって発表された「Transformer」アーキテクチャを提案した歴史的な研究論文のタイトル。<br>
過去の複雑な仕組み（再帰構造など）をすべて捨て、単語同士の関連性を計算する『Attention（アテンション）』だけに絞れば、はるかに賢く高速なAIができることを示した。<br>
「～is (not) all you need」系のタイトルの論文の元祖。
