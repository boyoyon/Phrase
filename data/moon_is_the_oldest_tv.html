        <h1><center>Nam June Paik</center></h1>
<p>
・Moon is the Oldest TV”
　(月は最古のTV)
</p>

<p>
「ビデオ・アートの父」と称される現代美術家ナム・ジュン・パイク（Nam June Paik）が残した有名なコンセプトであり、彼の代表的な作品のタイトルでもある。<br>
1965年〜1976年にかけて制作されたこの作品は、複数のテレビモニターを並べ、それぞれの画面に電子的な操作で「新月から満月へと移り変わる月の満ち欠け」を映し出したもの。
</p>
<p>
人類がはるか昔から夜空に浮かぶ月をじっと見つめて想像力を膨らませてきた行為を、現代人がテレビの画面を凝視する姿に重ね合わせた。
</p>
