        <h1><center>Толстой(トルストイ)</center></h1>
<p>
・Все счастливые семьи похожи друг на друга, каждая несчастливая семья несчастлива по-своему.<br>
　(幸せな家族はどれも同じように見え、不幸な家族はそれぞれに不幸である)<br>
<br>
小説『<a href="https://ilibrary.ru/text/1099/p.1/index.html">アンナ・カレーニナ</a>』の冒頭の一節。<br>
「成功には必要条件を全て満たさなければならないが、失敗は1つ欠けるだけで起こる」という原則 (アンナ・カレーニナの法則) として、生態学、経営学、機械学習など様々な分野で引用されている。
</p>
