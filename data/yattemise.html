<h3><a href="https://tsudoi-katsuyaku.com/management-training">山本五十六の「やってみせ」の活用法</a></h3>
<p>
やって見せ、言って聞かせて、させてみせ、ほめてやらねば、人は動かず<br>
<br>
話し合い、耳を傾け、承認し、任せてやらねば、人は育たず<br>
<br>
やっている、姿を感謝で見守って、信頼せねば、人は実らず<br>
</p>
<br>
<p>
困窮にあえぐ米沢藩を立て直した上杉鷹山の「してみせて　言って聞かせて　させてみる」をアレンジしたものと言われています。
